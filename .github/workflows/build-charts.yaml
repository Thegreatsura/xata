name: Build and Push Helm Charts

on:
  workflow_call:
    inputs:
      image_specs:
        description: "Newline-separated IMAGE=xxx TAG=yyy pairs"
        required: true
        type: string
      ref:
        description: "Git ref to checkout"
        required: false
        type: string
        default: ""

env:
  CHART_REGISTRY: oci://ghcr.io/xataio/xata/charts
  CHARTS: "auth clusters gateway projects branch-operator keycloak"

jobs:
  push-charts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Inject image tags into charts
        working-directory: charts
        run: |
          echo '${{ inputs.image_specs }}' | while IFS= read -r line; do
            if [[ -n "$line" ]]; then
              eval "$line"
              make inject-tags IMAGE="$IMAGE" TAG="$TAG"
            fi
          done

      - name: Package and push charts
        working-directory: charts
        run: make push-charts CHART_REGISTRY=${{ env.CHART_REGISTRY }} CHARTS="${{ env.CHARTS }}"
