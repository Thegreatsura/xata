# Very strict rate limits for organization invitation endpoints
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: org-invites-strict-ratelimit
  namespace: {{ .Release.Namespace }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: auth
  rateLimit:
    type: Local
    local:
      rules:
        # Very strict limit for organization invitations: 100 requests per hour
        - clientSelectors:
            - headers:
                - name: ":path"
                  value: "^/organizations/[^/]+/invitations.*"
          limit:
            requests: 100
            unit: Hour
        # Strict limit for organization members: 200 requests per hour
        - clientSelectors:
            - headers:
                - name: ":path"
                  value: "^/organizations/[^/]+/members.*"
          limit:
            requests: 200
            unit: Hour
