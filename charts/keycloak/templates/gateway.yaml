apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: keycloak-eg
  namespace: {{ .Release.Namespace }}
  annotations:
    kustomize.toolkit.fluxcd.io/prune: disabled
spec:
  gatewayClassName: eg
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: eg-custom-proxy-config
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: localhost
