version: v2
clean: true
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/xataio/maki/
plugins:
  - #local: protoc-gen-go
    remote: buf.build/grpc/go
    out: gen/proto
    opt: paths=source_relative
  - #local: protoc-gen-go-grpc
    remote: buf.build/protocolbuffers/go
    out: gen/proto
    opt: paths=source_relative
inputs:
  - directory: proto
