apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
  - https://github.com/cloudnative-pg/plugin-barman-cloud/releases/download/v0.10.0/manifest.yaml

patches:
  - target:
      kind: Deployment
      namespace: cnpg-system
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: dummy
      spec:
        template:
          spec:
            tolerations:
              - key: "xata.io/workload"
                value: "dataplane"
                effect: "NoSchedule"
