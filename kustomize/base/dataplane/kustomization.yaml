apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - kube-state-metrics

patches:
  - target:
      kind: Deployment
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: dummy
      spec:
        template:
          spec:
            tolerations:
              - key: "xata.io/workload"
                value: "dataplane"
                effect: "NoSchedule"
  - target:
      kind: Statefulset
    patch: |-
      apiVersion: apps/v1
      kind: Statefulset
      metadata:
        name: dummy
      spec:
        template:
          spec:
            tolerations:
              - key: "xata.io/workload"
                value: "dataplane"
                effect: "NoSchedule"
