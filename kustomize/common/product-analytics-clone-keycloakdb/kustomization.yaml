apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - cronjob.yaml
  # secret.yaml must be provided by each overlay

configMapGenerator:
  - name: product-analytics-clone-keycloak-scripts
    namespace: xata
    files:
      - clone.sh

generatorOptions:
  disableNameSuffixHash: true