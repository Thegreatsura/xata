apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: signoz-projects-setup
  namespace: xata
  labels:
    app.kubernetes.io/name: signoz-projects-setup
    app.kubernetes.io/component: initialization
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "patch", "update"]
  resourceNames: ["projects-secret"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: signoz-projects-setup
  namespace: xata
  labels:
    app.kubernetes.io/name: signoz-projects-setup
    app.kubernetes.io/component: initialization
subjects:
- kind: ServiceAccount
  name: signoz-projects-setup
  namespace: xata
roleRef:
  kind: Role
  name: signoz-projects-setup
  apiGroup: rbac.authorization.k8s.io
