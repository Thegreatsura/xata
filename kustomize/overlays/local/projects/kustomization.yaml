apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: xata

helmCharts:
  - name: projects
    releaseName: projects
    namespace: xata
    valuesFile: values.yaml

helmGlobals:
  chartHome: ../../../../charts

resources:
  - signoz-secret.yaml
  - signoz-setup-job.yaml
  - signoz-setup-serviceaccount.yaml
  - signoz-setup-rbac.yaml
