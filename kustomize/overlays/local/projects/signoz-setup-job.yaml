apiVersion: batch/v1
kind: Job
metadata:
  name: signoz-projects-setup
  namespace: xata
  labels:
    app.kubernetes.io/name: signoz-projects-setup
    app.kubernetes.io/component: initialization
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: signoz-projects-setup
        app.kubernetes.io/component: initialization
    spec:
      restartPolicy: OnFailure
      serviceAccountName: signoz-projects-setup
      containers:
        - name: wait-and-setup
          image: alpine/k8s:1.28.2
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "50m"
              memory: "128Mi"
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          command:
            - /bin/sh
            - -c
            - |
              set -e

              SIGNOZ_URL="http://signoz-local.signoz.svc.cluster.local:8080"
              ADMIN_EMAIL="dev@xata.tech"
              ADMIN_PASSWORD="XataDev1234!"
              API_KEY_NAME="xata-local-development"

              echo "Waiting for Signoz API to become ready..."

              wait_time=1
              max_wait=60
              attempt=1
              max_attempts=30

              while [ $attempt -le $max_attempts ]; do
                echo "Attempt $attempt/$max_attempts: Checking Signoz API..."

                if curl -s "${SIGNOZ_URL}/api/v2/sessions/context?email=${ADMIN_EMAIL}" 2>/dev/null \
                  | grep -q '"exists"'; then
                  echo "✅ Signoz API is responding"
                  break
                fi

                if [ $attempt -eq $max_attempts ]; then
                  echo "❌ Signoz API not ready after $max_attempts attempts"
                  exit 1
                fi

                echo "⏳ Signoz not ready, waiting ${wait_time}s before retry..."
                sleep $wait_time

                wait_time=$((wait_time * 2))
                if [ $wait_time -gt $max_wait ]; then
                  wait_time=$max_wait
                fi

                attempt=$((attempt + 1))
              done

              # Function to login and get a JWT token (v2 API)
              signoz_login() {
                echo "Discovering org ID..." >&2
                CONTEXT_RESPONSE=$(curl -s "${SIGNOZ_URL}/api/v2/sessions/context?email=${ADMIN_EMAIL}" 2>/dev/null)
                ORG_ID=$(echo "$CONTEXT_RESPONSE" | jq -r '.data.orgs[0].id // empty' 2>/dev/null)
                if [ -z "$ORG_ID" ]; then
                  echo "Could not discover org ID" >&2
                  return 1
                fi
                echo "Found org ID: $ORG_ID" >&2

                printf '{"email":"%s","password":"%s","orgId":"%s"}' "$ADMIN_EMAIL" "$ADMIN_PASSWORD" "$ORG_ID" > /tmp/login.json
                LOGIN_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${SIGNOZ_URL}/api/v2/sessions/email_password" \
                  -H "Content-Type: application/json" \
                  -d @/tmp/login.json)
                rm -f /tmp/login.json

                LOGIN_HTTP_CODE=$(echo "$LOGIN_RESPONSE" | tail -n1)
                LOGIN_BODY=$(echo "$LOGIN_RESPONSE" | head -n -1)

                if [ "$LOGIN_HTTP_CODE" != "200" ]; then
                  echo "Login failed (HTTP: $LOGIN_HTTP_CODE): $LOGIN_BODY" >&2
                  return 1
                fi

                echo "$LOGIN_BODY" | jq -r '.data.accessToken // empty' 2>/dev/null
              }

              # Function to get or create API key
              get_or_create_api_key() {
                echo "Attempting to login to Signoz..." >&2

                JWT_TOKEN=$(signoz_login)

                if [ -z "$JWT_TOKEN" ]; then
                  echo "❌ Could not login to Signoz" >&2
                  return 1
                fi

                echo "✅ Successfully logged in to Signoz" >&2

                # Check for existing API key
                echo "Checking for existing API key: $API_KEY_NAME" >&2

                EXISTING_PATS=$(curl -s -X GET "${SIGNOZ_URL}/api/v1/pats" \
                  -H "Authorization: Bearer $JWT_TOKEN" 2>/dev/null || echo "")

                EXISTING_TOKEN=$(echo "$EXISTING_PATS" | jq -r ".data[] | select(.name == \"$API_KEY_NAME\") | .token // empty" 2>/dev/null | head -1)

                if [ -n "$EXISTING_TOKEN" ]; then
                  echo "✅ API key '$API_KEY_NAME' already exists" >&2
                  echo "$EXISTING_TOKEN"
                  return 0
                fi

                echo "Creating new API key: $API_KEY_NAME" >&2

                # Create new API key
                printf '{"name":"%s","role":"ADMIN","expiresAt":null}' "$API_KEY_NAME" > /tmp/pat.json
                API_KEY_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${SIGNOZ_URL}/api/v1/pats" \
                  -H "Content-Type: application/json" \
                  -H "Authorization: Bearer $JWT_TOKEN" \
                  -d @/tmp/pat.json)
                rm -f /tmp/pat.json

                API_KEY_HTTP_CODE=$(echo "$API_KEY_RESPONSE" | tail -n1)
                API_KEY_BODY=$(echo "$API_KEY_RESPONSE" | head -n -1)

                if [ "$API_KEY_HTTP_CODE" = "200" ] || [ "$API_KEY_HTTP_CODE" = "201" ]; then
                  API_KEY=$(echo "$API_KEY_BODY" | jq -r '.data.token // empty' 2>/dev/null)

                  if [ -n "$API_KEY" ]; then
                    echo "✅ API key created successfully" >&2
                    echo "$API_KEY"
                    return 0
                  else
                    echo "❌ Could not extract API key from successful response" >&2
                    return 1
                  fi
                else
                  echo "❌ Failed to create API key. HTTP: $API_KEY_HTTP_CODE" >&2
                  echo "Response: $API_KEY_BODY" >&2
                  return 1
                fi
              }

              # Get or create API key
              echo "Getting or creating Signoz API key..."

              if API_KEY=$(get_or_create_api_key); then
                echo "✅ Successfully obtained Signoz API key"

                # Update the projects secret with the API key
                echo "Updating projects-secret with Signoz API key..."
                current_time=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

                # Create a temporary file with the patch
                cat > /tmp/patch.json << EOF
              [
                {
                  "op": "add",
                  "path": "/data/SIGNOZ_API_KEY",
                  "value": "$(echo -n "$API_KEY" | base64)"
                },
                {
                  "op": "add",
                  "path": "/data/SIGNOZ_API_KEY_UPDATED",
                  "value": "$(echo -n "$current_time" | base64)"
                }
              ]
              EOF

                if kubectl patch secret projects-secret -n xata --type='json' --patch-file=/tmp/patch.json; then
                  echo "✅ API key stored in projects-secret successfully"
                  echo "✅ Projects Signoz setup completed successfully"
                  exit 0
                else
                  echo "❌ Failed to update projects-secret"
                  exit 1
                fi
              else
                echo "❌ Failed to get Signoz API key"
                exit 1
              fi
      volumes:
        - name: tmp
          emptyDir: {}
