apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - secret.yaml
  - httproute.yaml

configMapGenerator:
  - name: keycloak-realm
    files:
      - realm.json
    options:
      annotations:
        kustomize.toolkit.fluxcd.io/substitute: disabled
      disableNameSuffixHash: true
